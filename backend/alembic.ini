[alembic]
script_location = alembic
prepend_sys_path = .
# DSN 在 alembic/env.py 中从 app.core.config.settings.DATABASE_URL 读取并转 sync,这里仅占位
sqlalchemy.url = postgresql+psycopg://liujingjing@localhost:5433/overseas_supply_dev

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
